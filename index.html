<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chris</title>
  <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --surface: #18181b;
      --surface-2: #27272a;
      --border: #3f3f46;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --radius: 12px;
      --transition: 0.2s ease;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 720px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Header ────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease infinite;
    }

    .status-dot.offline { background: var(--red); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-actions {
      display: flex;
      gap: 4px;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: background var(--transition), color var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ── Chat Area ─────────────────────────────────── */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    .chat::-webkit-scrollbar { width: 6px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 3px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.bot {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.5;
      font-size: 15px;
      word-wrap: break-word;
    }

    .message.user .bubble {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .audio-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all var(--transition);
      font-family: inherit;
    }

    .audio-btn:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .audio-btn.playing {
      color: var(--green);
      border-color: var(--green);
    }

    /* ── Typing indicator ──────────────────────────── */
    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 14px;
      align-self: flex-start;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing 1.4s ease infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* ── Input Area ────────────────────────────────── */
    .input-area {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .context-bar {
      height: 2px;
      background: var(--surface-2);
      border-radius: 1px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .context-fill {
      height: 100%;
      width: 0%;
      border-radius: 1px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-row textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color var(--transition);
    }

    .input-row textarea:focus {
      border-color: var(--text-muted);
    }

    .input-row textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity var(--transition);
      flex-shrink: 0;
    }

    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .send-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ── Slide-over Panel ──────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 340px;
      max-width: 90vw;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 60;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
    }

    .panel.open {
      transform: translateX(0);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-header h3 {
      font-size: 15px;
      font-weight: 600;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 2px; }

    .panel-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Memory list ───────────────────────────────── */
    .memory-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--surface-2);
    }

    .memory-item:last-child { border-bottom: none; }

    .memory-key {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .memory-value {
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      padding: 40px 0;
    }

    /* ── Persona editor ────────────────────────────── */
    .persona-editor {
      width: 100%;
      min-height: 300px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      padding: 12px;
      resize: vertical;
      outline: none;
      line-height: 1.6;
    }

    .persona-editor:focus {
      border-color: var(--text-muted);
    }

    /* ── Buttons ───────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
      font-family: inherit;
    }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
    }

    .btn-primary:hover { opacity: 0.85; }

    .btn-ghost {
      background: none;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .btn-danger {
      background: none;
      color: var(--red);
      border: 1px solid var(--red);
    }

    .btn-danger:hover {
      background: var(--red);
      color: white;
    }

    .btn-full { width: 100%; }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Reset Modal ───────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 320px;
      max-width: 90vw;
    }

    .modal h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .modal p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Welcome ───────────────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      line-height: 1.6;
      max-width: 320px;
    }

    /* ── Responsive ────────────────────────────────── */
    @media (max-width: 480px) {
      .app { max-width: 100%; }
      header { padding: 12px 16px; }
      .chat { padding: 16px; }
      .input-area { padding: 8px 16px 12px; }
      .message { max-width: 92%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header>
      <div class="header-left">
        <div class="status-dot" id="statusDot"></div>
        <span class="logo" id="logoName">Chris</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="memBtn" title="Memories">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 1 7 7c0 3-2 5.5-3.5 7.5L12 22l-3.5-5.5C7 14.5 5 12 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2"/></svg>
          <span id="memCount" style="font-size:11px;margin-left:2px;"></span>
        </button>
        <button class="icon-btn" id="personaBtn" title="Persona">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
        </button>
        <button class="icon-btn" id="exportBtn" title="Export">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="icon-btn" id="resetBtn" title="Reset">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
      </div>
    </header>

    <!-- Chat -->
    <div class="chat" id="chat">
      <div class="welcome" id="welcome">
        <h2>Hey, I'm Chris</h2>
        <p>I'm here to listen. Say whatever's on your mind.</p>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="context-bar">
        <div class="context-fill" id="contextFill"></div>
      </div>
      <div class="input-row">
        <textarea id="userInput" rows="1" placeholder="Type a message..."></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Slide-over overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Memory Panel -->
  <div class="panel" id="memPanel">
    <div class="panel-header">
      <h3>Memories</h3>
      <button class="icon-btn" id="memClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="panel-body" id="memList"></div>
    <div class="panel-footer">
      <div class="btn-group">
        <button class="btn btn-ghost btn-full" id="clearMemBtn">Clear Memories</button>
      </div>
    </div>
  </div>

  <!-- Persona Panel -->
  <div class="panel" id="personaPanel">
    <div class="panel-header">
      <h3>Persona</h3>
      <button class="icon-btn" id="personaClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="panel-body">
      <textarea class="persona-editor" id="personaArea"></textarea>
    </div>
    <div class="panel-footer">
      <div class="btn-group">
        <button class="btn btn-primary btn-full" id="savePersonaBtn">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Reset Modal -->
  <div class="modal-overlay" id="resetModal">
    <div class="modal">
      <h3>Reset</h3>
      <p>What would you like to reset?</p>
      <div class="modal-actions">
        <button class="btn btn-ghost btn-full" id="modalCancel">Cancel</button>
        <button class="btn btn-ghost btn-full" id="modalResetChat">Reset Chat Only</button>
        <button class="btn btn-danger btn-full" id="modalResetAll">Reset Chat &amp; Memories</button>
      </div>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    const chat = $('#chat');
    const welcome = $('#welcome');
    const input = $('#userInput');
    const sendBtn = $('#sendBtn');
    const contextFill = $('#contextFill');
    const statusDot = $('#statusDot');
    const logoName = $('#logoName');
    const memCount = $('#memCount');
    const overlay = $('#overlay');
    const memPanel = $('#memPanel');
    const personaPanel = $('#personaPanel');
    const memList = $('#memList');
    const personaArea = $('#personaArea');
    const resetModal = $('#resetModal');

    let isSending = false;
    let currentAudio = null;

    function timeStr(ts) {
      return new Date(ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function hideWelcome() {
      if (welcome) welcome.style.display = 'none';
    }

    function scrollToBottom() {
      chat.scrollTop = chat.scrollHeight;
    }

    function addMessage(role, text, timestamp) {
      hideWelcome();
      const div = document.createElement('div');
      div.className = `message ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      div.appendChild(bubble);

      if (timestamp) {
        const time = document.createElement('div');
        time.className = 'msg-time';
        time.textContent = timeStr(timestamp);
        div.appendChild(time);
      }

      chat.appendChild(div);
      scrollToBottom();
      return div;
    }

    function addAudioButton(msgEl, url) {
      const btn = document.createElement('button');
      btn.className = 'audio-btn';
      btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Replay';
      btn.onclick = () => {
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        currentAudio = new Audio(url);
        btn.classList.add('playing');
        btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Playing...';
        currentAudio.onended = () => {
          btn.classList.remove('playing');
          btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Replay';
          currentAudio = null;
        };
        currentAudio.play();
      };
      msgEl.appendChild(btn);
    }

    function playAudio(url, btn) {
      if (currentAudio) { currentAudio.pause(); }
      currentAudio = new Audio(url);
      if (btn) {
        btn.classList.add('playing');
        btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Playing...';
      }
      currentAudio.onended = () => {
        if (btn) {
          btn.classList.remove('playing');
          btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Replay';
        }
        currentAudio = null;
      };
      currentAudio.play();
    }

    function showTyping() {
      hideWelcome();
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typingIndicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      chat.appendChild(div);
      scrollToBottom();
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    function openPanel(panel) {
      overlay.classList.add('open');
      panel.classList.add('open');
    }

    function closePanels() {
      overlay.classList.remove('open');
      memPanel.classList.remove('open');
      personaPanel.classList.remove('open');
    }

    overlay.addEventListener('click', closePanels);

    async function fetchMemories() {
      try {
        const r = await fetch('/memories');
        if (!r.ok) return {};
        const data = await r.json();
        const entries = Object.entries(data);
        memCount.textContent = entries.length || '';

        if (entries.length === 0) {
          memList.innerHTML = '<div class="empty-state">No memories yet</div>';
          return data;
        }

        memList.innerHTML = entries.map(([k, v]) =>
          `<div class="memory-item"><div class="memory-key">${k}</div><div class="memory-value">${v}</div></div>`
        ).join('');
        return data;
      } catch { return {}; }
    }

    async function fetchContext() {
      try {
        const r = await fetch('/context');
        if (!r.ok) return;
        const d = await r.json();
        const pct = Math.min(100, d.pct || 0);
        contextFill.style.width = pct + '%';
        contextFill.style.background = d.level === 'high' ? 'var(--red)' : d.level === 'medium' ? 'var(--yellow)' : 'var(--green)';
      } catch {}
    }

    async function fetchPersona() {
      try {
        const r = await fetch('/persona');
        if (!r.ok) return;
        const d = await r.json();
        personaArea.value = JSON.stringify(d, null, 2);
        logoName.textContent = d.name || 'Chris';
      } catch {}
    }

    async function fetchHealth() {
      try {
        const r = await fetch('/health');
        if (!r.ok) return;
        const d = await r.json();
        statusDot.classList.toggle('offline', !d.llama_reachable);
      } catch {}
    }

    async function send() {
      const text = input.value.trim();
      if (!text || isSending) return;

      isSending = true;
      sendBtn.disabled = true;
      input.value = '';
      autoResize();

      addMessage('user', text, Date.now() / 1000);
      showTyping();

      try {
        const r = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        hideTyping();

        if (!r.ok) {
          addMessage('bot', 'Something went wrong. Try again.', Date.now() / 1000);
          return;
        }

        const data = await r.json();
        const msgEl = addMessage('bot', data.text, Date.now() / 1000);

        if (data.audio_url) {
          addAudioButton(msgEl, data.audio_url);
          playAudio(data.audio_url, msgEl.querySelector('.audio-btn'));
        }

        await Promise.all([fetchMemories(), fetchContext()]);
      } catch {
        hideTyping();
        addMessage('bot', 'Connection error. Is the server running?', Date.now() / 1000);
      }

      isSending = false;
      sendBtn.disabled = !input.value.trim();
      input.focus();
    }

    function autoResize() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    }

    input.addEventListener('input', () => {
      autoResize();
      sendBtn.disabled = !input.value.trim();
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', send);

    $('#memBtn').addEventListener('click', async () => {
      await fetchMemories();
      openPanel(memPanel);
    });

    $('#memClose').addEventListener('click', closePanels);

    $('#personaBtn').addEventListener('click', async () => {
      await fetchPersona();
      openPanel(personaPanel);
    });

    $('#personaClose').addEventListener('click', closePanels);

    $('#savePersonaBtn').addEventListener('click', async () => {
      try {
        const obj = JSON.parse(personaArea.value);
        const r = await fetch('/persona', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ persona: obj })
        });
        if (r.ok) {
          logoName.textContent = obj.name || 'Chris';
          closePanels();
        }
      } catch {
        alert('Invalid JSON');
      }
    });

    $('#clearMemBtn').addEventListener('click', async () => {
      await fetch('/memories', { method: 'DELETE' });
      await fetchMemories();
    });

    $('#exportBtn').addEventListener('click', async () => {
      const r = await fetch('/export');
      if (!r.ok) return;
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'conversation.txt';
      document.body.appendChild(a); a.click();
      a.remove(); URL.revokeObjectURL(url);
    });

    $('#resetBtn').addEventListener('click', () => resetModal.classList.add('open'));
    $('#modalCancel').addEventListener('click', () => resetModal.classList.remove('open'));

    $('#modalResetChat').addEventListener('click', async () => {
      await fetch('/reset', { method: 'DELETE' });
      resetModal.classList.remove('open');
      chat.innerHTML = '';
      chat.appendChild(welcome);
      welcome.style.display = '';
      await fetchContext();
    });

    $('#modalResetAll').addEventListener('click', async () => {
      await fetch('/reset', { method: 'DELETE' });
      await fetch('/memories', { method: 'DELETE' });
      resetModal.classList.remove('open');
      chat.innerHTML = '';
      chat.appendChild(welcome);
      welcome.style.display = '';
      await Promise.all([fetchMemories(), fetchContext()]);
    });

    (async () => {
      await Promise.all([fetchMemories(), fetchContext(), fetchPersona(), fetchHealth()]);
      setInterval(fetchContext, 15000);
      setInterval(fetchHealth, 30000);
    })();
  </script>
</body>
</html>
