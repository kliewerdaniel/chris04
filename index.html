<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chris</title>
  <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --surface: #18181b;
      --surface-2: #27272a;
      --border: #3f3f46;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --radius: 12px;
      --transition: 0.2s ease;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 720px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Header ────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(9,9,11,0.95);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
      transition: opacity 0.2s;
    }

    .header-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease infinite;
    }

    .status-dot.offline { background: var(--red); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-actions {
      display: flex;
      gap: 4px;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: background var(--transition), color var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
    }

    .icon-btn.auto-active {
      color: var(--green);
      background: rgba(34, 197, 94, 0.1);
    }

    .icon-btn.auto-active:hover {
      background: rgba(34, 197, 94, 0.2);
    }

    .auto-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease infinite;
      pointer-events: none;
    }

    /* ── Chat Area ─────────────────────────────────── */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    .chat::-webkit-scrollbar { width: 6px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 3px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: fadeIn 0.18s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.bot {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 15px;
      word-wrap: break-word;
      max-width: 100%;
    }

    .message.user .bubble {
      background: #1e1e24;
      border: 1px solid #3a3a44;
      border-bottom-right-radius: 5px;
      color: var(--text);
    }

    .message.bot .bubble {
      background: #141417;
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      color: #e4e4e7;
    }

    /* Group consecutive messages from same sender */
    .message.bot + .message.bot .bubble {
      border-top-left-radius: 5px;
    }

    .message.user + .message.user .bubble {
      border-top-right-radius: 5px;
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .audio-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all var(--transition);
      font-family: inherit;
    }

    .audio-btn:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .audio-btn.playing {
      color: var(--green);
      border-color: var(--green);
    }

    /* ── Typing indicator ──────────────────────────── */
    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 14px;
      align-self: flex-start;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing 1.4s ease infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* ── Input Area ────────────────────────────────── */
    .input-area {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .context-bar {
      height: 3px;
      background: var(--surface-2);
      border-radius: 2px;
      margin-bottom: 10px;
      overflow: hidden;
      cursor: help;
      position: relative;
    }

    .context-bar:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 8px;
      left: 0;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
    }

    .context-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      transition: width 0.5s ease, background 0.5s ease;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-row textarea {
      flex: 1;
      background: #141417;
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      padding: 10px 16px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .input-row textarea:focus {
      border-color: #52525b;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }

    .input-row textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      flex-shrink: 0;
    }

    .send-btn:hover { opacity: 0.9; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

    .send-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ── Slide-over Panel ──────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 340px;
      max-width: 90vw;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 60;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
    }

    .panel.open {
      transform: translateX(0);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-header h3 {
      font-size: 15px;
      font-weight: 600;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 2px; }

    .panel-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Memory list ───────────────────────────────── */
    .memory-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--surface-2);
    }

    .memory-item:last-child { border-bottom: none; }

    .memory-key {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .memory-value {
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      padding: 40px 0;
    }

    /* ── Persona editor ────────────────────────────── */
    .persona-editor {
      width: 100%;
      min-height: 300px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      padding: 12px;
      resize: vertical;
      outline: none;
      line-height: 1.6;
    }

    .persona-editor:focus {
      border-color: var(--text-muted);
    }

    /* ── Buttons ───────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
      font-family: inherit;
    }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
    }

    .btn-primary:hover { opacity: 0.85; }

    .btn-ghost {
      background: none;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .btn-danger {
      background: none;
      color: var(--red);
      border: 1px solid var(--red);
    }

    .btn-danger:hover {
      background: var(--red);
      color: white;
    }

    .btn-full { width: 100%; }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Reset Modal ───────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 320px;
      max-width: 90vw;
    }

    .modal h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .modal p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Welcome ───────────────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 20px;
      flex: 1;
      gap: 6px;
    }

    .welcome-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      font-size: 22px;
    }

    .welcome h2 {
      font-size: 19px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .welcome p {
      font-size: 14px;
      line-height: 1.6;
      max-width: 240px;
      color: var(--text-muted);
    }

    /* ── Toasts ─────────────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }

    .toast {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 20px;
      animation: toastIn 0.25s ease, toastOut 0.3s ease 2.2s forwards;
      white-space: nowrap;
    }

    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* ── TTS spinner on audio btn ───────────────────── */
    .audio-btn.generating {
      color: var(--text-muted);
      border-color: var(--border);
      cursor: wait;
    }

    /* ── Memory flash highlight ─────────────────────── */
    @keyframes memFlash {
      0% { background: var(--surface-2); }
      40% { background: rgba(34,197,94,0.15); }
      100% { background: transparent; }
    }
    .memory-item.new {
      animation: memFlash 1.2s ease forwards;
    }

    /* ── Char counter ───────────────────────────────── */
    .char-counter {
      font-size: 11px;
      color: var(--text-muted);
      text-align: right;
      margin-top: 4px;
      height: 14px;
      transition: color 0.2s;
    }
    .char-counter.warn { color: var(--yellow); }
    .char-counter.over { color: var(--red); }

    /* ── Message copy button ────────────────────────── */
    .copy-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .message:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--text); }
    .copy-btn.copied { color: var(--green); opacity: 1; }

    /* ── Improved memory panel items ────────────────── */
    .memory-item {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--surface-2);
      gap: 8px;
    }
    .memory-item-text { flex: 1; min-width: 0; }
    .memory-delete-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 14px;
      opacity: 0;
      flex-shrink: 0;
      transition: opacity 0.15s, color 0.15s;
      line-height: 1;
    }
    #memList .memory-item:hover .memory-delete-btn { opacity: 1; }
    .memory-delete-btn:hover { color: var(--red); }

    .memory-value-input {
      width: 100%;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 5px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      padding: 2px 6px;
      margin: 0 -6px;
      outline: none;
      line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
    }

    .memory-value-input:hover {
      border-color: var(--border);
      background: var(--surface-2);
    }

    .memory-value-input:focus {
      border-color: var(--text-muted);
      background: var(--bg);
    }

    .memory-value-input.saved {
      border-color: var(--green);
    }

    .add-memory-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .add-memory-key {
      width: 80px;
      flex-shrink: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 6px 8px;
      outline: none;
    }

    .add-memory-key:focus { border-color: var(--text-muted); }

    .add-memory-val {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 6px 8px;
      outline: none;
      min-width: 0;
    }

    .add-memory-val:focus { border-color: var(--text-muted); }

    .add-memory-row .btn {
      padding: 6px 12px;
      flex-shrink: 0;
      font-size: 12px;
    }

    /* ── Speed dial ─────────────────────────────────── */
    .speed-dial {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 4px;
    }

    .speed-dial label {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      user-select: none;
    }

    .speed-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 72px;
      height: 3px;
      border-radius: 2px;
      background: var(--surface-2);
      outline: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }

    .speed-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .speed-slider::-moz-range-thumb {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--text);
      border: none;
      cursor: pointer;
    }

    .speed-value {
      font-size: 11px;
      color: var(--text-muted);
      min-width: 22px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ── Connection banner ──────────────────────────── */
    .conn-banner {
      background: var(--red);
      color: white;
      font-size: 12px;
      text-align: center;
      padding: 6px;
      display: none;
      flex-shrink: 0;
    }
    .conn-banner.visible { display: block; }

    /* ── Scroll to bottom button ────────────────────── */
    .scroll-btn {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 5;
      font-family: inherit;
      white-space: nowrap;
    }
    .scroll-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Responsive ────────────────────────────────── */
    @media (max-width: 480px) {
      .app { max-width: 100%; }
      header { padding: 12px 16px; }
      .chat { padding: 16px; }
      .input-area { padding: 8px 16px 12px; }
      .message { max-width: 92%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toast-container" id="toastContainer"></div>
    <div class="conn-banner" id="connBanner">⚠ Cannot reach llama.cpp server — responses will fail</div>
    <!-- Header -->
    <header>
      <div class="header-left">
        <div class="status-dot" id="statusDot"></div>
        <div>
          <div class="logo" id="logoName">Chris</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="speed-dial">
          <label for="speedSlider">speed</label>
          <input type="range" class="speed-slider" id="speedSlider" min="0.5" max="2.5" step="0.05" value="1" />
          <span class="speed-value" id="speedValue">1×</span>
        </div>
        <button class="icon-btn" id="memBtn" title="Memories">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 1 7 7c0 3-2 5.5-3.5 7.5L12 22l-3.5-5.5C7 14.5 5 12 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2"/></svg>
          <span id="memCount" style="font-size:11px;margin-left:2px;"></span>
        </button>
        <button class="icon-btn" id="personaBtn" title="Persona">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
        </button>
        <button class="icon-btn" id="exportBtn" title="Export">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="icon-btn" id="resetBtn" title="Reset">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
        <button class="icon-btn" id="autoBtn" title="Auto mode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
      </div>
    </header>

    <!-- Chat -->
    <div class="chat" id="chat">
      <div class="welcome" id="welcome">
        <div class="welcome-avatar">👋</div>
        <h2 id="welcomeName">Hey, I'm Chris</h2>
        <p>SHEEEEEEEEEBA!!!!!!</p>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="context-bar">
        <div class="context-fill" id="contextFill"></div>
      </div>
      <div class="input-row">
        <textarea id="userInput" rows="1" placeholder="Type a message..."></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="char-counter" id="charCounter"></div>
    </div>
    <button class="scroll-btn" id="scrollBtn" onclick="chat.scrollTop=chat.scrollHeight">↓ Scroll to bottom</button>
  </div>

  <!-- Slide-over overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Memory Panel -->
  <div class="panel" id="memPanel">
    <div class="panel-header">
      <div style="display:flex;align-items:center;gap:8px;">
        <h3>Memories</h3>
        <span id="memBadge" style="background:var(--surface-2);border:1px solid var(--border);border-radius:10px;font-size:11px;padding:1px 7px;color:var(--text-muted);"></span>
      </div>
      <button class="icon-btn" id="memClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="panel-body" id="memList"></div>
    <div class="panel-footer">
      <div class="add-memory-row">
        <input class="add-memory-key" id="newMemKey" placeholder="KEY" maxlength="30" />
        <input class="add-memory-val" id="newMemVal" placeholder="value" maxlength="80" />
        <button class="btn btn-primary" id="addMemBtn">Add</button>
      </div>
      <div class="btn-group" style="margin-top:8px;">
        <button class="btn btn-ghost btn-full" id="clearMemBtn">Clear All Memories</button>
      </div>
    </div>
  </div>

  <!-- Persona Panel -->
  <div class="panel" id="personaPanel">
    <div class="panel-header">
      <h3>Persona</h3>
      <button class="icon-btn" id="personaClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="panel-body">
      <textarea class="persona-editor" id="personaArea"></textarea>
    </div>
    <div class="panel-footer">
      <div class="btn-group">
        <button class="btn btn-primary btn-full" id="savePersonaBtn">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Reset Modal -->
  <div class="modal-overlay" id="resetModal">
    <div class="modal">
      <h3>Reset</h3>
      <p>What would you like to reset?</p>
      <div class="modal-actions">
        <button class="btn btn-ghost btn-full" id="modalCancel">Cancel</button>
        <button class="btn btn-ghost btn-full" id="modalResetChat">Reset Chat Only</button>
        <button class="btn btn-danger btn-full" id="modalResetAll">Reset Chat &amp; Memories</button>
      </div>
    </div>
  </div>

  <script>
const $ = (s) => document.querySelector(s);
const chat = $('#chat');
const welcome = $('#welcome');
const input = $('#userInput');
const sendBtn = $('#sendBtn');
const contextFill = $('#contextFill');
const statusDot = $('#statusDot');
const logoName = $('#logoName');
const memCount = $('#memCount');
const overlay = $('#overlay');
const memPanel = $('#memPanel');
const personaPanel = $('#personaPanel');
const memList = $('#memList');
const personaArea = $('#personaArea');
const resetModal = $('#resetModal');
const toastContainer = $('#toastContainer');
const charCounter = $('#charCounter');
const connBanner = $('#connBanner');

const MAX_CHARS = 2000;
let isSending = false;
let currentAudio = null;
let previousMemoryKeys = new Set();
let autoModeEnabled = false;
let autoPollInterval = null;
let autoIsGenerating = false;

// ── Toast ────────────────────────────────────────────
function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = `toast${type ? ' ' + type : ''}`;
  el.textContent = msg;
  toastContainer.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// ── Utilities ─────────────────────────────────────────
function timeStr(ts) {
  return new Date(ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function hideWelcome() {
  if (welcome) welcome.style.display = 'none';
}

function scrollToBottom() {
  chat.scrollTop = chat.scrollHeight;
}

// ── Message rendering ─────────────────────────────────
function addMessage(role, text, timestamp) {
  hideWelcome();
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  div.appendChild(bubble);

  const meta = document.createElement('div');
  meta.style.cssText = 'display:flex;align-items:center;gap:6px;';

  if (timestamp) {
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = timeStr(timestamp);
    meta.appendChild(time);
  }

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.classList.add('copied');
      copyBtn.textContent = '✓ Copied';
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyBtn.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
      }, 1500);
    });
  };
  meta.appendChild(copyBtn);
  div.appendChild(meta);

  chat.appendChild(div);
  scrollToBottom();
  return div;
}

function addAudioButton(msgEl, url) {
  const btn = document.createElement('button');
  btn.className = 'audio-btn';
  btn.innerHTML = '▶ Replay';
  btn.onclick = () => playAudio(url, btn);
  msgEl.appendChild(btn);
}

function addGeneratingAudioButton(msgEl) {
  const btn = document.createElement('button');
  btn.className = 'audio-btn generating';
  btn.innerHTML = '◌ Generating audio…';
  btn.disabled = true;
  msgEl.appendChild(btn);
  return btn;
}

function getPlaybackRate() {
  const slider = document.getElementById('speedSlider');
  return slider ? parseFloat(slider.value) : 1.0;
}

function playAudio(url, btn) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  currentAudio = new Audio(url);
  currentAudio.playbackRate = getPlaybackRate();
  if (btn) {
    btn.classList.add('playing');
    btn.innerHTML = '⏸ Playing…';
  }
  currentAudio.onended = () => {
    if (btn) {
      btn.classList.remove('playing');
      btn.innerHTML = '▶ Replay';
    }
    currentAudio = null;
  };
  currentAudio.onerror = () => {
    if (btn) { btn.classList.remove('playing'); btn.innerHTML = '▶ Replay'; }
    currentAudio = null;
  };
  currentAudio.play().catch(() => {});
}

function showTyping() {
  hideWelcome();
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// ── Panels ─────────────────────────────────────────────
function openPanel(panel) {
  overlay.classList.add('open');
  panel.classList.add('open');
}

function closePanels() {
  overlay.classList.remove('open');
  memPanel.classList.remove('open');
  personaPanel.classList.remove('open');
}

overlay.addEventListener('click', closePanels);

// ── Memory panel ────────────────────────────────────────
async function fetchMemories(highlightNew = false) {
  try {
    const r = await fetch('/memories');
    if (!r.ok) return {};
    const data = await r.json();
    const entries = Object.entries(data);
    const currentKeys = new Set(entries.map(([k]) => k));
    memCount.textContent = entries.length || '';
    const badge = document.getElementById('memBadge');
    if (badge) badge.textContent = entries.length ? `${entries.length} stored` : '';

    if (entries.length === 0) {
      memList.innerHTML = '<div class="empty-state">No memories yet.<br><small>Facts you share will appear here.</small></div>';
      previousMemoryKeys = currentKeys;
      return data;
    }

    memList.innerHTML = entries.map(([k, v]) => {
      const isNew = highlightNew && !previousMemoryKeys.has(k);
      const safeKey = k.replace(/'/g, "\\'");
      const safeVal = v.replace(/"/g, '&quot;').replace(/'/g, "\\'");
      return `<div class="memory-item${isNew ? ' new' : ''}" data-key="${k}">
        <div class="memory-item-text">
          <div class="memory-key">${k.replace(/_/g, ' ')}</div>
          <input
            class="memory-value-input"
            value="${v.replace(/"/g, '&quot;')}"
            data-original="${safeVal}"
            onblur="saveMemoryEdit('${safeKey}', this)"
            onkeydown="if(event.key==='Enter'){this.blur();} if(event.key==='Escape'){this.value=this.dataset.original;this.blur();}"
          />
        </div>
        <button class="memory-delete-btn" onclick="deleteMemory('${safeKey}')" title="Delete">×</button>
      </div>`;
    }).join('');

    const newKeys = highlightNew ? [...currentKeys].filter(k => !previousMemoryKeys.has(k)) : [];
    if (newKeys.length > 0) {
      toast(`Remembered ${newKeys.length} new fact${newKeys.length > 1 ? 's' : ''}`, 'success');
    }

    previousMemoryKeys = currentKeys;
    return data;
  } catch { return {}; }
}

async function saveMemoryEdit(key, inputEl) {
  const newValue = inputEl.value.trim();
  const original = inputEl.dataset.original;
  if (newValue === original || newValue === '') {
    inputEl.value = original;
    return;
  }
  try {
    const r = await fetch('/memories');
    const memories = await r.json();
    memories[key] = newValue;
    await fetch('/memories', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ memories })
    });
    inputEl.dataset.original = newValue;
    inputEl.classList.add('saved');
    setTimeout(() => inputEl.classList.remove('saved'), 800);
    memCount.textContent = Object.keys(memories).length || '';
  } catch {
    toast('Failed to save edit', 'error');
    inputEl.value = original;
  }
}

async function deleteMemory(key) {
  try {
    const r = await fetch('/memories');
    const memories = await r.json();
    delete memories[key];
    await fetch('/memories', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ memories })
    });
    await fetchMemories();
    toast('Memory deleted');
  } catch {
    toast('Failed to delete memory', 'error');
  }
}

async function fetchContext() {
  try {
    const r = await fetch('/context');
    if (!r.ok) return;
    const d = await r.json();
    const pct = Math.min(100, d.pct || 0);
    contextFill.style.width = pct + '%';
    contextFill.style.background = d.level === 'high' ? 'var(--red)' : d.level === 'medium' ? 'var(--yellow)' : 'var(--green)';
    document.querySelector('.context-bar').dataset.tip = `Context window: ${Math.round(pct)}% used`;
  } catch {}
}

async function fetchPersona() {
  try {
    const r = await fetch('/persona');
    if (!r.ok) return;
    const d = await r.json();
    personaArea.value = JSON.stringify(d, null, 2);
    logoName.textContent = d.name || 'Chris';
    const welcomeName = document.getElementById('welcomeName');
    if (welcomeName) welcomeName.textContent = `Hey, I'm ${d.name || 'Chris'}`;
  } catch {}
}

async function fetchHealth() {
  try {
    const r = await fetch('/health');
    if (!r.ok) return;
    const d = await r.json();
    const offline = !d.llama_reachable;
    statusDot.classList.toggle('offline', offline);
    connBanner.classList.toggle('visible', offline);
  } catch {}
}

async function pollAutoMode() {
  if (!autoModeEnabled || isSending || autoIsGenerating) return;

  try {
    autoIsGenerating = true;
    const r = await fetch('/auto-mode/poll');
    if (!r.ok) { autoIsGenerating = false; return; }
    const data = await r.json();

    if (data.message) {
      const msgEl = addMessage('bot', data.message, Date.now() / 1000);
      if (data.audio_url) {
        addAudioButton(msgEl, data.audio_url);
        playAudio(data.audio_url, msgEl.querySelector('.audio-btn'));
      }
      await fetchMemories(true);
    }
  } catch {
    // silent — auto mode polling should never show errors
  } finally {
    autoIsGenerating = false;
  }
}

function startAutoMode() {
  autoModeEnabled = true;
  autoPollInterval = setInterval(pollAutoMode, 4000);
  document.getElementById('autoBtn').classList.add('auto-active');
  toast('Auto mode on', 'success');
}

function stopAutoMode() {
  autoModeEnabled = false;
  if (autoPollInterval) { clearInterval(autoPollInterval); autoPollInterval = null; }
  autoIsGenerating = false;
  document.getElementById('autoBtn').classList.remove('auto-active');
  toast('Auto mode off');
}

async function toggleAutoMode() {
  const newState = !autoModeEnabled;
  try {
    await fetch('/auto-mode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: newState })
    });
    if (newState) startAutoMode(); else stopAutoMode();
  } catch {
    toast('Failed to toggle auto mode', 'error');
  }
}

// ── Send ────────────────────────────────────────────────
async function send() {
  const text = input.value.trim();
  if (!text || isSending) return;
  if (text.length > MAX_CHARS) {
    toast('Message too long', 'error');
    return;
  }

  isSending = true;
  sendBtn.disabled = true;
  input.value = '';
  updateCharCounter();
  autoResize();

  addMessage('user', text, Date.now() / 1000);
  showTyping();

  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });

    hideTyping();

    if (!r.ok) {
      addMessage('bot', 'Something went wrong. Try again.', Date.now() / 1000);
      isSending = false;
      sendBtn.disabled = false;
      input.focus();
      return;
    }

    const data = await r.json();
    const msgEl = addMessage('bot', data.text, Date.now() / 1000);

    if (data.audio_url) {
      addAudioButton(msgEl, data.audio_url);
      playAudio(data.audio_url, msgEl.querySelector('.audio-btn'));
    }

    // Refresh memories and highlight any new ones
    await Promise.all([fetchMemories(true), fetchContext()]);
  } catch {
    hideTyping();
    addMessage('bot', 'Connection error. Is the server running?', Date.now() / 1000);
    toast('Connection error', 'error');
  }

  isSending = false;
  sendBtn.disabled = !input.value.trim();
  input.focus();
}

// ── Input handling ──────────────────────────────────────
function updateCharCounter() {
  const len = input.value.length;
  if (len === 0) {
    charCounter.textContent = '';
    charCounter.className = 'char-counter';
    return;
  }
  const remaining = MAX_CHARS - len;
  if (remaining > 200) {
    charCounter.textContent = '';
    charCounter.className = 'char-counter';
  } else {
    charCounter.textContent = `${remaining} remaining`;
    charCounter.className = `char-counter${remaining < 50 ? ' over' : remaining < 100 ? ' warn' : ''}`;
  }
}

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

input.addEventListener('input', () => {
  autoResize();
  updateCharCounter();
  sendBtn.disabled = !input.value.trim() || isSending;
  if (autoPollInterval) {
    clearInterval(autoPollInterval);
    autoPollInterval = setTimeout(() => {
      if (autoModeEnabled) {
        autoPollInterval = setInterval(pollAutoMode, 4000);
      }
    }, 5000);
  }
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener('click', send);

// ── Button wiring ───────────────────────────────────────
$('#memBtn').addEventListener('click', async () => {
  await fetchMemories();
  openPanel(memPanel);
});
$('#memClose').addEventListener('click', closePanels);

$('#personaBtn').addEventListener('click', async () => {
  await fetchPersona();
  openPanel(personaPanel);
});
$('#personaClose').addEventListener('click', closePanels);

$('#savePersonaBtn').addEventListener('click', async () => {
  try {
    const obj = JSON.parse(personaArea.value);
    const r = await fetch('/persona', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ persona: obj })
    });
    if (r.ok) {
      logoName.textContent = obj.name || 'Chris';
      closePanels();
      toast('Persona saved', 'success');
    }
  } catch {
    toast('Invalid JSON — check the format', 'error');
  }
});

$('#clearMemBtn').addEventListener('click', async () => {
  if (!confirm('Clear all memories?')) return;
  await fetch('/memories', { method: 'DELETE' });
  previousMemoryKeys = new Set();
  await fetchMemories();
  toast('Memories cleared');
});

$('#addMemBtn').addEventListener('click', async () => {
  const keyEl = document.getElementById('newMemKey');
  const valEl = document.getElementById('newMemVal');
  const key = keyEl.value.trim().toUpperCase().replace(/\s+/g, '_');
  const val = valEl.value.trim();
  if (!key || !val) { toast('Enter both a key and value', 'error'); return; }
  try {
    const r = await fetch('/memories');
    const memories = await r.json();
    memories[key] = val;
    await fetch('/memories', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ memories })
    });
    keyEl.value = '';
    valEl.value = '';
    await fetchMemories();
    toast('Memory added', 'success');
  } catch {
    toast('Failed to add memory', 'error');
  }
});

$('#exportBtn').addEventListener('click', async () => {
  const r = await fetch('/export');
  if (!r.ok) { toast('Export failed', 'error'); return; }
  const blob = await r.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'conversation.txt';
  document.body.appendChild(a); a.click();
  a.remove(); URL.revokeObjectURL(url);
  toast('Conversation exported');
});

$('#resetBtn').addEventListener('click', () => resetModal.classList.add('open'));
$('#modalCancel').addEventListener('click', () => resetModal.classList.remove('open'));
$('#autoBtn').addEventListener('click', toggleAutoMode);

$('#modalResetChat').addEventListener('click', async () => {
  await fetch('/reset', { method: 'DELETE' });
  resetModal.classList.remove('open');
  chat.innerHTML = '';
  chat.appendChild(welcome);
  welcome.style.display = '';
  await fetchContext();
  toast('Chat reset');
});

$('#modalResetAll').addEventListener('click', async () => {
  await fetch('/reset', { method: 'DELETE' });
  await fetch('/memories', { method: 'DELETE' });
  previousMemoryKeys = new Set();
  resetModal.classList.remove('open');
  chat.innerHTML = '';
  chat.appendChild(welcome);
  welcome.style.display = '';
  await Promise.all([fetchMemories(), fetchContext()]);
  toast('Chat and memories reset');
});

// ── Init ────────────────────────────────────────────────
const scrollBtn = document.getElementById('scrollBtn');
chat.addEventListener('scroll', () => {
  const nearBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 100;
  scrollBtn.classList.toggle('visible', !nearBottom);
});

(async () => {
  await Promise.all([fetchMemories(), fetchContext(), fetchPersona(), fetchHealth()]);
  setInterval(fetchContext, 15000);
  setInterval(fetchHealth, 30000);

  // ── Speed dial ────────────────────────────────────
  const speedSlider = document.getElementById('speedSlider');
  const speedValue = document.getElementById('speedValue');

  speedSlider.addEventListener('input', () => {
    const rate = parseFloat(speedSlider.value);
    speedValue.textContent = rate.toFixed(2).replace(/\.?0+$/, '') + '×';
    if (currentAudio) {
      currentAudio.playbackRate = rate;
    }
  });

  const savedSpeed = localStorage.getItem('playbackRate');
  if (savedSpeed) {
    speedSlider.value = savedSpeed;
    speedSlider.dispatchEvent(new Event('input'));
  }

  speedSlider.addEventListener('change', () => {
    localStorage.setItem('playbackRate', speedSlider.value);
  });
})();
  </script>
</body>
</html>
